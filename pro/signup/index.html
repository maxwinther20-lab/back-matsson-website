<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <!-- Hero Section -->
    <section class="relative h-screen">
        <img src="https://source.unsplash.com/featured/?industrial" alt="Industrial Background" class="absolute inset-0 object-cover w-full h-full">
        <div class="flex items-center justify-center h-full bg-black bg-opacity-50">
            <h1 class="text-5xl font-bold text-white">Welcome to Our Website</h1>
        </div>
    </section>

    <!-- Services Section -->
    <section class="py-16 bg-white">
        <div class="container mx-auto text-center">
            <h2 class="text-3xl font-bold">Our Services</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-8">
                <div class="bg-gray-200 p-5 rounded shadow-md">
                    <img src="https://source.unsplash.com/featured/?warehouse" alt="Service 1" class="w-full h-40 object-cover rounded-md">
                    <h3 class="text-xl font-semibold mt-2">Service 1</h3>
                    <p>Description of Service 1.</p>
                </div>
                <div class="bg-gray-200 p-5 rounded shadow-md">
                    <img src="https://source.unsplash.com/featured/?logistics" alt="Service 2" class="w-full h-40 object-cover rounded-md">
                    <h3 class="text-xl font-semibold mt-2">Service 2</h3>
                    <p>Description of Service 2.</p>
                </div>
                <div class="bg-gray-200 p-5 rounded shadow-md">
                    <img src="https://source.unsplash.com/featured/?construction" alt="Service 3" class="w-full h-40 object-cover rounded-md">
                    <h3 class="text-xl font-semibold mt-2">Service 3</h3>
                    <p>Description of Service 3.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="py-16 bg-gray-100">
        <div class="container mx-auto text-center">
            <h2 class="text-3xl font-bold">Gallery</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
                <div>
                    <img src="https://source.unsplash.com/featured/?industrial,hall" alt="Gallery Image 1" class="rounded-lg shadow-md h-48 w-full object-cover">
                </div>
                <div>
                    <img src="https://source.unsplash.com/featured/?warehouse" alt="Gallery Image 2" class="rounded-lg shadow-md h-48 w-full object-cover">
                </div>
                <div>
                    <img src="https://source.unsplash.com/featured/?event" alt="Gallery Image 3" class="rounded-lg shadow-md h-48 w-full object-cover">
                </div>
            </div>
        </div>
    </section>
</body>
</html>
