<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Halls</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #434343, #000000);
            color: #ffffff;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        header {
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 0.5em;
        }

        p {
            font-size: 1.5em;
            margin-bottom: 1em;
        }

        .image-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .image {
            width: calc(33% - 20px);
            margin: 10px;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .image:hover {
            transform: scale(1.05);
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Industrial Halls Gallery</h1>
        <p>Explore our collection of warehouses and industrial events.</p>
    </header>
    <div class="image-container">
        <div class="image">
            <img src="https://images.unsplash.com/photo-1555621680-436eeb4df8fb?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwxMTc3M3wwfDF8c2VhcmNofDE5fHxpbmR1c3RyaWFsJTIwaGFsbHxlbnwwfHx8fDE2MTM5Nzg5NjE&ixlib=rb-1.2.1&q=80&w=400" alt="Industrial Hall">
        </div>
        <div class="image">
            <img src="https://images.unsplash.com/photo-1587445645382-2522b227757c?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwxMTc3M3wwfDF8c2VhcmNofDV8fHdhcmVob3VzZXxlbnwwfHx8fDE2MTM5Nzg5NjE&ixlib=rb-1.2.1&q=80&w=400" alt="Warehouse">
        </div>
        <div class="image">
            <img src="https://images.unsplash.com/photo-1597942372436-e05896de7e93?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwxMTc3M3wwfDF8c2VhcmNofDExfHxldmVudC1oaWdlJTIwaGFsbHxlbnwwfHx8fDE2MTM5Nzg5NjE&ixlib=rb-1.2.1&q=80&w=400" alt="Event Hall">
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Industrial Halls. All rights reserved.</p>
    </footer>
</body>
</html>
